name: Django CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run_tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DEPLOY_ENVIRONMENT: test
      DOCKER_BUILD_FLAGS: --quiet
    steps:
      - uses: actions/checkout@v6
      - name: build containers and run Django tests
        run: make test
